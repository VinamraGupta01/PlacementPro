# ============================================
#  SMART PLACEMENT MANAGEMENT SYSTEM - CONFIG
# ============================================
spring.application.name=Smart Placement Management System
server.port=8080

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://localhost:3306/placement_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootdev122
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Auto initialize schema (seed data is inserted via DataInitializer.java) ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

# ---- File Upload (resumes) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/resumes

# ---- JWT ----
app.jwt.secret=ZmFrZS1zZWNyZXQta2V5LXBsZWFzZS1jaGFuZ2UtaXQtaW4tcHJvZHVjdGlvbi1lbnZpcm9ubWVudC0xMjM0NTY3OA==
app.jwt.expiration-ms=86400000

# ---- Swagger ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ---- Logging ----
logging.level.org.springframework=INFO
logging.level.com.placement=DEBUG
