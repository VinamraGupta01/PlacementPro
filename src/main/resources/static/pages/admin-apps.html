<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Applications · Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('ADMIN'); if(!auth) return;
  renderShell('admin-apps');

  const params = new URLSearchParams(location.search);
  const jobId = params.get('jobId');

  setTitle('Applications', jobId ? ('Applicants for job #'+jobId) : 'All student applications.');

  async function load(){
    const url = jobId ? '/api/jobs/'+jobId+'/applicants' : '/api/admin/applications';
    const apps = (await API.get(url)).data;

    setBody(`
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-2 align-items-center">
          <select id="filter" class="form-select" style="max-width:200px;">
            <option value="">All statuses</option>
            ${['APPLIED','SHORTLISTED','INTERVIEW','SELECTED','REJECTED'].map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
        <a class="btn btn-outline-primary" href="/api/admin/export/applications"><i class="bi bi-download me-1"></i>Export CSV</a>
      </div>

      <div class="card-section">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>ID</th><th>Student</th><th>Job · Company</th><th>Match</th><th>Status</th><th>Applied</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    `);

    function render(){
      const f = document.getElementById('filter').value;
      const tbody = document.getElementById('tbody');
      const rows = apps.filter(a => !f || a.status === f);
      tbody.innerHTML = rows.length === 0
        ? '<tr><td colspan="7" class="text-muted text-center py-4">No applications</td></tr>'
        : rows.map(a=>`
          <tr>
            <td>#${a.id}</td>
            <td><div class="fw-semibold">${escapeHtml(a.studentName||'')}</div><div class="small text-muted">${escapeHtml(a.studentEmail||'')}</div></td>
            <td><div class="fw-semibold">${escapeHtml(a.jobTitle||'')}</div><div class="small text-muted">${escapeHtml(a.companyName||'')}</div></td>
            <td><strong>${a.matchScore||0}%</strong></td>
            <td>
              <select class="form-select form-select-sm" onchange="setStatus(${a.id}, this.value)">
                ${['APPLIED','SHORTLISTED','INTERVIEW','SELECTED','REJECTED'].map(s=>`<option ${s===a.status?'selected':''}>${s}</option>`).join('')}
              </select>
            </td>
            <td class="small text-muted">${fmtDate(a.appliedAt)}</td>
            <td><span class="status-pill s-${escapeHtml(a.status)}">${escapeHtml(a.status)}</span></td>
          </tr>`).join('');
    }

    document.getElementById('filter').addEventListener('change', render);
    render();
  }

  window.setStatus = async (id, status)=>{
    try{ await API.put('/api/admin/applications/'+id+'/status', { status }); toast('Status updated'); load(); }
    catch(e){ toast(e.message,'error'); }
  };

  load();
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
