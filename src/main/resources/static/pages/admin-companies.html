<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Companies · Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('ADMIN'); if(!auth) return;
  renderShell('admin-companies');
  setTitle('Companies', 'Add and manage recruiting partners.');

  async function load(){
    const companies = (await API.get('/api/admin/companies')).data;
    setBody(`
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card-section">
            <h6 class="fw-bold">Add Company</h6>
            <form id="f" class="mt-2">
              <div class="mb-2"><label class="form-label small">Name</label><input class="form-control" name="name" required></div>
              <div class="mb-2"><label class="form-label small">Website</label><input class="form-control" name="website"></div>
              <div class="mb-2"><label class="form-label small">Location</label><input class="form-control" name="location"></div>
              <div class="mb-2"><label class="form-label small">Description</label><textarea class="form-control" name="description" rows="2"></textarea></div>
              <button class="btn btn-primary w-100">Add company</button>
            </form>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card-section">
            <h6 class="fw-bold mb-3">All companies (${companies.length})</h6>
            ${companies.length === 0 ? '<p class="text-muted small">No companies yet.</p>' :
              `<div class="row g-3">${companies.map(c=>`
                <div class="col-md-6">
                  <div class="company-tile">
                    <div class="logo">${escapeHtml((c.name||'?').charAt(0))}</div>
                    <div class="flex-grow-1">
                      <div class="fw-semibold">${escapeHtml(c.name)}</div>
                      <div class="small text-muted">${escapeHtml(c.location||'-')} · <a href="${escapeHtml(c.website||'#')}" target="_blank">${escapeHtml(c.website||'')}</a></div>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="del(${c.id})"><i class="bi bi-trash"></i></button>
                  </div>
                </div>`).join('')}</div>`}
          </div>
        </div>
      </div>
    `);

    document.getElementById('f').addEventListener('submit', async (e)=>{
      e.preventDefault();
      try{
        await API.post('/api/admin/companies', Object.fromEntries(new FormData(e.target)));
        toast('Company added'); load();
      }catch(ex){ toast(ex.message,'error'); }
    });
  }
  window.del = async (id)=>{
    if(!confirm('Delete this company and ALL its jobs?')) return;
    try{ await API.del('/api/admin/companies/'+id); toast('Deleted'); load(); }
    catch(e){ toast(e.message,'error'); }
  };
  load();
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
