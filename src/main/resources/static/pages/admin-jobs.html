<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jobs · Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('ADMIN'); if(!auth) return;
  renderShell('admin-jobs');
  setTitle('Jobs', 'Create job/internship postings with smart eligibility rules.');

  async function load(){
    const [jobs, companies] = await Promise.all([
      API.get('/api/jobs'), API.get('/api/admin/companies')
    ]);

    setBody(`
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card-section">
            <h6 class="fw-bold">Create Job / Internship</h6>
            <form id="f" class="mt-2">
              <div class="mb-2"><label class="form-label small">Company</label>
                <select name="companyId" class="form-select" required>
                  ${companies.data.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
                </select>
              </div>
              <div class="mb-2"><label class="form-label small">Title</label><input class="form-control" name="title" required></div>
              <div class="mb-2"><label class="form-label small">Description</label><textarea class="form-control" name="description" rows="3"></textarea></div>
              <div class="row g-2">
                <div class="col-6"><label class="form-label small">Type</label>
                  <select class="form-select" name="jobType"><option>INTERNSHIP</option><option value="FULL_TIME">Full-time</option></select>
                </div>
                <div class="col-6"><label class="form-label small">Location</label><input class="form-control" name="location"></div>
                <div class="col-4"><label class="form-label small">Min CGPA</label><input type="number" step="0.01" class="form-control" name="minCgpa" value="0"></div>
                <div class="col-4"><label class="form-label small">Year</label><input type="number" class="form-control" name="passingYear" value="2026"></div>
                <div class="col-4"><label class="form-label small">Deadline</label><input type="date" class="form-control" name="deadline"></div>
                <div class="col-12"><label class="form-label small">Eligible Branches (comma)</label><input class="form-control" name="eligibleBranches" value="CSE,IT"></div>
                <div class="col-12"><label class="form-label small">Required Skills (comma)</label><input class="form-control" id="reqSkills" placeholder="Java, Spring Boot, MySQL"></div>
              </div>
              <button class="btn btn-primary w-100 mt-3">Post job</button>
            </form>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card-section">
            <h6 class="fw-bold mb-3">All Jobs (${jobs.data.length})</h6>
            ${jobs.data.length === 0 ? '<p class="text-muted small">No jobs yet.</p>' :
              jobs.data.map(j=>`
                <div class="job-card mb-3">
                  <div class="d-flex justify-content-between">
                    <div>
                      <h6 class="mb-1">${escapeHtml(j.title)}</h6>
                      <div class="meta"><i class="bi bi-building"></i> ${escapeHtml(j.companyName||'')} · <i class="bi bi-geo-alt"></i> ${escapeHtml(j.location||'-')}</div>
                      <div class="small">CGPA ≥ ${j.minCgpa ?? 0} · Branches: ${escapeHtml(j.eligibleBranches||'')} · Year ${j.passingYear ?? '-'}</div>
                      <div class="mt-1">${(j.requiredSkills||[]).map(s=>`<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div>
                    </div>
                    <div class="text-end">
                      <span class="badge bg-primary-soft text-primary">${escapeHtml(j.jobType||'')}</span>
                      <div class="small text-muted mt-2">Deadline: ${fmtDate(j.deadline)}</div>
                      <a class="btn btn-sm btn-outline-primary mt-2" href="/pages/admin-apps.html?jobId=${j.id}">Applicants</a>
                      <button class="btn btn-sm btn-outline-danger mt-2" onclick="del(${j.id})"><i class="bi bi-trash"></i></button>
                    </div>
                  </div>
                </div>`).join('')}
          </div>
        </div>
      </div>
    `);

    document.getElementById('f').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      body.companyId   = parseInt(body.companyId);
      body.minCgpa     = parseFloat(body.minCgpa||0);
      body.passingYear = body.passingYear ? parseInt(body.passingYear) : null;
      body.requiredSkills = document.getElementById('reqSkills').value.split(',').map(s=>s.trim()).filter(Boolean);
      try{ await API.post('/api/jobs', body); toast('Job posted'); load(); }
      catch(ex){ toast(ex.message,'error'); }
    });
  }
  window.del = async (id)=>{
    if(!confirm('Delete this job?')) return;
    try{ await API.del('/api/jobs/'+id); toast('Deleted'); load(); }
    catch(e){ toast(e.message,'error'); }
  };
  load();
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
