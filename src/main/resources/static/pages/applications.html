<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>My Applications · PlacementPro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('STUDENT'); if(!auth) return;
  renderShell('applications');
  setTitle('My Applications', 'Track every job you applied to.');

  const res = await API.get('/api/students/'+auth.userId+'/applications');
  const apps = res.data;

  setBody(`
    <div class="card-section">
      ${apps.length === 0 ? '<p class="text-muted mb-0">No applications yet — browse jobs to get started.</p>' : `
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Job</th><th>Company</th><th>Match</th><th>Status</th><th>Applied</th></tr></thead>
          <tbody>
            ${apps.map(a=>`
              <tr>
                <td><div class="fw-semibold">${escapeHtml(a.jobTitle)}</div></td>
                <td>${escapeHtml(a.companyName)}</td>
                <td><strong>${a.matchScore||0}%</strong></td>
                <td><span class="status-pill s-${escapeHtml(a.status)}">${escapeHtml(a.status)}</span></td>
                <td class="small text-muted">${fmtDate(a.appliedAt)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
  `);
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
