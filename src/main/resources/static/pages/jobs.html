<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jobs · PlacementPro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('STUDENT'); if(!auth) return;
  renderShell('jobs');
  setTitle('Browse Jobs & Internships', 'Smart eligibility & instant match scores.');

  setBody(`
    <div class="row g-2 mb-3 align-items-center">
      <div class="col-md-6"><input id="q" class="form-control" placeholder="Search by title, company, skill…"></div>
      <div class="col-md-3"><select id="type" class="form-select"><option value="">All types</option><option>INTERNSHIP</option><option value="FULL_TIME">Full-time</option></select></div>
      <div class="col-md-3 text-end"><button id="onlyEligible" class="btn btn-outline-primary">Show only eligible</button></div>
    </div>
    <div id="jobsGrid" class="row g-3"></div>
  `);

  let allJobs = [];
  let eligibleIds = new Set();

  async function load(){
    const [jobsRes, eligRes] = await Promise.all([
      API.get('/api/jobs'),
      API.get('/api/jobs/eligible/'+auth.userId)
    ]);
    allJobs = jobsRes.data;
    eligibleIds = new Set(eligRes.data.map(j=>j.id));
    render();
  }
  let onlyEligible = false;

  function render(){
    const q = (document.getElementById('q').value || '').toLowerCase();
    const t = document.getElementById('type').value;
    const filtered = allJobs.filter(j => {
      if(t && j.jobType !== t) return false;
      if(onlyEligible && !eligibleIds.has(j.id)) return false;
      if(q){
        const hay = (j.title+' '+(j.companyName||'')+' '+((j.requiredSkills||[]).join(' '))).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    document.getElementById('jobsGrid').innerHTML = filtered.length === 0
      ? '<div class="text-muted">No jobs match your filters.</div>'
      : filtered.map(j=>`
        <div class="col-md-6 col-xl-4">
          <div class="job-card h-100">
            <div class="d-flex justify-content-between">
              <span class="badge bg-primary-soft text-primary">${escapeHtml(j.jobType||'')}</span>
              ${eligibleIds.has(j.id) ? '<span class="badge bg-success-soft text-success">Eligible</span>' : '<span class="badge bg-danger-soft text-danger">Not eligible</span>'}
            </div>
            <h5 class="mt-2 mb-1">${escapeHtml(j.title)}</h5>
            <div class="meta"><i class="bi bi-building"></i> ${escapeHtml(j.companyName||'')} · <i class="bi bi-geo-alt"></i> ${escapeHtml(j.location||'-')}</div>
            <p class="text-muted small mb-2">${escapeHtml((j.description||'').slice(0,140))}…</p>
            <div class="small">CGPA ≥ <b>${j.minCgpa ?? 0}</b> · Branches: <b>${escapeHtml(j.eligibleBranches||'Any')}</b></div>
            <div class="mt-2">${(j.requiredSkills||[]).map(s=>`<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <small class="text-muted">Deadline: ${fmtDate(j.deadline)}</small>
              <div>
                <button class="btn btn-sm btn-outline-primary" onclick="checkMatch(${j.id})">Match</button>
                <button class="btn btn-sm btn-primary" onclick="apply(${j.id})" ${eligibleIds.has(j.id)?'':'disabled'}>Apply</button>
              </div>
            </div>
            <div id="match-${j.id}" class="mt-2 small"></div>
          </div>
        </div>`).join('');
  }

  window.apply = async (jobId) => {
    try{
      await API.post('/api/jobs/'+jobId+'/apply/'+auth.userId);
      toast('Application submitted! 🎉');
      load();
    }catch(e){ toast(e.message,'error'); }
  };

  window.checkMatch = async (jobId) => {
    try{
      const r = await API.get('/api/jobs/'+jobId+'/match/'+auth.userId);
      const m = r.data;
      const el = document.getElementById('match-'+jobId);
      el.innerHTML = `
        <div class="d-flex justify-content-between">
          <span>${m.eligible ? 'Match' : '<span class="text-danger">Not eligible: '+escapeHtml(m.eligibilityReason)+'</span>'}</span>
          <strong>${m.matchScore}%</strong>
        </div>
        <div class="progress my-1" style="height:6px;"><div class="progress-bar" style="width:${m.matchScore}%;background:linear-gradient(90deg,#6366f1,#22d3ee);"></div></div>
        <div>${(m.matchedSkills||[]).map(s=>`<span class="skill-tag bg-success-soft" style="color:#166534;">${escapeHtml(s)}</span>`).join('')}
        ${(m.missingSkills||[]).map(s=>`<span class="skill-tag bg-danger-soft" style="color:#991b1b;">${escapeHtml(s)}</span>`).join('')}</div>
      `;
    }catch(e){ toast(e.message,'error'); }
  };

  document.getElementById('q').addEventListener('input', render);
  document.getElementById('type').addEventListener('change', render);
  document.getElementById('onlyEligible').addEventListener('click', (e)=>{
    onlyEligible = !onlyEligible;
    e.target.classList.toggle('btn-primary', onlyEligible);
    e.target.classList.toggle('btn-outline-primary', !onlyEligible);
    render();
  });

  load();
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
