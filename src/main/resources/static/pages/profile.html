<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Profile · PlacementPro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
(async ()=>{
  const auth = API.requireAuth('STUDENT'); if(!auth) return;
  renderShell('profile');
  setTitle('My Profile', 'Keep your details fresh for the best match.');

  const me = (await API.get('/api/students/'+auth.userId)).data;

  setBody(`
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card-section">
          <h6 class="fw-bold mb-3">Personal Information</h6>
          <form id="profileForm" class="row g-3">
            <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" value="${escapeHtml(me.name||'')}"/></div>
            <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" value="${escapeHtml(me.email||'')}" disabled/></div>
            <div class="col-md-6"><label class="form-label">Branch</label>
              <select class="form-select" name="branch">
                ${['CSE','IT','ECE','EEE','MECH','CIVIL'].map(b=>`<option ${me.branch===b?'selected':''}>${b}</option>`).join('')}
              </select>
            </div>
            <div class="col-md-3"><label class="form-label">CGPA</label><input type="number" step="0.01" min="0" max="10" class="form-control" name="cgpa" value="${me.cgpa ?? ''}"/></div>
            <div class="col-md-3"><label class="form-label">Passing Year</label><input type="number" class="form-control" name="passingYear" value="${me.passingYear ?? ''}"/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone" value="${escapeHtml(me.phone||'')}"/></div>
            <div class="col-12 text-end"><button class="btn btn-primary">Save changes</button></div>
          </form>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card-section mb-3">
          <h6 class="fw-bold mb-2">Skills</h6>
          <p class="small text-muted">Comma-separated list. These power your smart match score.</p>
          <textarea id="skillsBox" class="form-control mb-2" rows="3">${(me.skills||[]).join(', ')}</textarea>
          <button class="btn btn-outline-primary btn-sm" onclick="saveSkills()">Save skills</button>
        </div>
        <div class="card-section">
          <h6 class="fw-bold mb-2">Resume</h6>
          ${me.resumeUrl ? `<p class="small mb-2">Current: <a href="${me.resumeUrl}" target="_blank">${me.resumeUrl}</a></p>`:'<p class="small text-muted">No resume uploaded yet.</p>'}
          <input type="file" id="resumeFile" class="form-control mb-2" accept=".pdf,.doc,.docx"/>
          <button class="btn btn-outline-primary btn-sm" onclick="uploadResume()">Upload</button>
        </div>
      </div>
    </div>
  `);

  document.getElementById('profileForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const body = Object.fromEntries(new FormData(e.target));
    body.cgpa = body.cgpa ? parseFloat(body.cgpa) : null;
    body.passingYear = body.passingYear ? parseInt(body.passingYear) : null;
    try{ await API.put('/api/students/'+auth.userId, body); toast('Profile updated'); }
    catch(ex){ toast(ex.message,'error'); }
  });

  window.saveSkills = async () => {
    const skills = document.getElementById('skillsBox').value.split(',').map(s=>s.trim()).filter(Boolean);
    try{ await API.post('/api/students/'+auth.userId+'/skills', { skills }); toast('Skills saved'); }
    catch(ex){ toast(ex.message,'error'); }
  };
  window.uploadResume = async () => {
    const f = document.getElementById('resumeFile').files[0];
    if(!f) return toast('Choose a file first','warning');
    const fd = new FormData(); fd.append('file', f);
    try{ const r = await API.post('/api/students/'+auth.userId+'/resume', fd); toast('Resume uploaded'); setTimeout(()=>location.reload(),700); }
    catch(ex){ toast(ex.message,'error'); }
  };
})().catch(e=>{ console.error(e); toast(e.message,'error'); });
</script>
</body>
</html>
